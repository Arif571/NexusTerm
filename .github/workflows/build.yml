name: Enterprise Android Build
on: [push]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true' # Supres warning Node.js 20 secara resmi
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android SDK & Accept Licenses
      uses: android-actions/setup-android@v3
      with:
        accept-android-sdk-licenses: true

    - name: Install Required Components
      run: |
        sdkmanager "platforms;android-34" "build-tools;34.0.0" "ndk;21.4.7075529" --sdk_root=$ANDROID_HOME > /dev/null 2>&1
        echo "sdk.dir=$ANDROID_HOME" >> local.properties
        echo "ndk.dir=$ANDROID_HOME/ndk/21.4.7075529" >> local.properties
        chmod +x gradlew

    - name: Build APK
      run: ./gradlew assembleDebug -x lint -x test --stacktrace

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: NexusTerm-Debug-APK
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30
